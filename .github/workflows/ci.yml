name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  fixtures:
    name: Compose fixtures (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      # composer.json schema check. No `composer install`: the Compose layer is
      # dependency-free (pure PHP, no Illuminate/external use), so the fixture
      # runner executes against src/Compose/*.php directly.
      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Run Compose fixture suite
        run: php tests/Compose/run.php
